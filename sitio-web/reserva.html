        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        cyber: '#dc2626', // Rojo ByteKnight
                        dark: '#030712'
                    }
                }
            }
        }
    </script>

    <!-- Librería de Timekit.io -->
    <script src="https://cdn.timekit.io/booking-js/v3/booking.min.js"></script>
</head>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agendar Auditoría | ByteKnight</title>
    
    <script src="https://cdn.tailwindcss.com\"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        cyber: '#dc2626', // Rojo ByteKnight
                        dark: '#030712'
                    }
                }
            }
        }
    </script>

    <script type="text/javascript">
      (function (C, A, L) { let p = function (a, ar) { a.q.push(ar); }; let d = C.document; C.Cal = C.Cal || function () { let cal = C.Cal; let ar = arguments; if (!cal.q) { cal.q = []; } p(cal, ar); }; let js = d.createElement("script"); js.src = A; js.async = true; d.head.appendChild(js); }(window, "https://app.cal.com/embed/embed.js", "Cal"));
      
      // Inicializamos el calendario cuando la página cargue
      window.addEventListener('DOMContentLoaded', () => {
        Cal("init", { origin: "https://app.cal.com" });

        // Renderizamos el calendario dentro de nuestro contenedor del HTML
        Cal("inline", {
          elementOrSelector: "#cal-open-source-container",
          calLink: "byteknight/auditoria-30min", // Aquí irá tu link de Cal.com
          config: { 
            layout: "month_view",
            theme: "dark" // Se acopla perfectamente al modo oscuro de tu web
          }
        });

        // Evento opcional: Si quieres redirigir a purchases.html al terminar la reserva
        Cal("on", {
          action: "bookingSuccessful",
          callback: (e) => {
            console.log("Reserva completada con éxito en la API Open Source");
            window.location.href = "purchases.html";
          }
        });
      });
    </script>
</head>
<body class="min-h-screen bg-gray-950 text-gray-100 py-12 px-4 sm:px-6 lg:px-8 font-sans bg-[url('data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMjAiIGhlaWdodD0iMjAiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+PGNpcmNsZSBjeD0iMSIgY3k9IjEiIHI9IjEiIGZpbGw9InJnYmEoMjU1LDI1NSwyNTUsMC4wNSkiLz48L3N2Zz4=')]">

        <div class="text-center mb-8">
            <h2 class="text-3xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-white via-gray-200 to-gray-400 font-mono tracking-wider uppercase">
                Agendar Auditoría Premium
            </h2>
            <p class="mt-2 text-sm text-gray-400 font-mono">

        <div id="cal-open-source-container" class="w-full h-[600px] bg-gray-950/50 rounded-xl border border-white/5 overflow-y-auto">
            </div>

        <div class="mt-8 text-center">
            <a href="index.html" class="inline-flex items-center space-x-2 text-xs font-mono tracking-widest text-gray-500 hover:text-cyber transition uppercase">
                <span>&lt; Abortar Operación y Volver</span>
