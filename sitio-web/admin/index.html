
<!DOCTYPE html>
<html lang="es" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Restringido | ByteKnight</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        cyber: '#dc2626',
                        dark: '#030712'
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-950 text-gray-100 font-sans h-screen w-full overflow-hidden bg-[url('data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMjAiIGhlaWdodD0iMjAiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+PGNpcmNsZSBjeD0iMSIgY3k9IjEiIHI9IjEiIGZpbGw9InJnYmEoMjU1LDI1NSwyNTUsMC4wNSkiLz48L3N2Zz4=')]">

    <!-- LOGIN GATEWAY -->
    <div id="loginGateway" class="absolute inset-0 z-50 flex items-center justify-center bg-gray-950/90 backdrop-blur-md transition-opacity duration-500">
        <div class="max-w-sm w-full border border-white/10 bg-gray-900 rounded-xl p-8 shadow-[0_0_40px_rgba(220,38,38,0.15)] relative overflow-hidden mx-4">
            
            <div class="absolute top-0 left-0 w-full h-1 bg-cyber shadow-[0_0_20px_#dc2626]"></div>

            <div class="text-center mb-8">
                <svg class="w-12 h-12 text-cyber mx-auto mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
                <h2 class="text-2xl font-mono uppercase tracking-widest text-white">Terminal <span class="text-cyber">Admin</span></h2>
                <p class="text-gray-500 text-xs font-mono mt-2">Identificación de seguridad requerida</p>
            </div>

            <div class="space-y-4">
                <div>
                    <label class="block text-xs font-mono uppercase tracking-wider text-gray-400 mb-1">Usuario</label>
                    <input type="text" id="adminUser" placeholder="ej: admin" class="w-full px-4 py-3 rounded-md bg-gray-950 border border-gray-800 text-gray-200 focus:outline-none focus:border-cyber focus:ring-1 focus:ring-cyber transition-all font-mono text-sm" autocomplete="off">
                </div>
                <div>
                    <label class="block text-xs font-mono uppercase tracking-wider text-gray-400 mb-1">Contraseña</label>
                    <input type="password" id="adminPass" placeholder="••••••••" class="w-full px-4 py-3 rounded-md bg-gray-950 border border-gray-800 text-gray-200 focus:outline-none focus:border-cyber focus:ring-1 focus:ring-cyber transition-all font-mono text-sm">
                </div>

                <p id="loginError" class="text-cyber text-xs font-mono hidden animate-pulse">Acceso denegado: Credenciales inválidas.</p>

                <button onclick="verificarLogin()" class="w-full mt-4 group/button relative inline-flex items-center justify-center overflow-hidden rounded-md bg-cyber/20 px-6 py-3 text-sm font-mono uppercase tracking-widest font-bold text-white transition-all duration-300 hover:border-cyber/50 border border-white/10">
                    <span id="btnText">Desencriptar</span>
                    <div class="absolute inset-0 flex h-full w-full justify-center [transform:skew(-13deg)_translateX(-100%)] group-hover/button:duration-1000 group-hover/button:[transform:skew(-13deg)_translateX(100%)]">
                        <div class="relative h-full w-10 bg-white/30"></div>
                    </div>
                </button>
            </div>
        </div>
    </div>

    <!-- DASHBOARD -->
    <div id="dashboardContent" class="hidden h-screen w-full flex opacity-0 transition-opacity duration-1000">
        
        <!-- Sidebar Simplificada -->
        <aside class="w-64 bg-gray-950 border-r border-white/10 hidden md:flex flex-col">
            <div class="h-20 flex items-center px-8 border-b border-white/10">
                <span class="text-xl font-mono uppercase tracking-widest font-bold text-white">
                    Byte<span class="text-cyber">Knight</span>
                </span>
            </div>
            
            <nav class="flex-1 px-4 py-8 space-y-2 font-mono text-sm uppercase tracking-wider">
                <a href="#" class="flex items-center px-4 py-3 bg-cyber/10 text-cyber rounded-lg border border-cyber/30">
                    Panel de Reservas
                </a>
            </nav>

            <div class="p-4 border-t border-white/10">
                <button onclick="cerrarSesion()" class="flex items-center px-4 py-2 w-full text-sm font-mono text-gray-500 hover:text-cyber hover:bg-white/5 rounded transition-colors">
                    Cerrar Sesión
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 flex flex-col h-screen overflow-hidden">
            <header class="h-20 border-b border-white/10 bg-gray-900/50 backdrop-blur-md flex items-center justify-between px-8">
                <h1 class="text-xl font-mono uppercase tracking-widest text-white">Registro Operativo</h1>
                <div class="flex items-center space-x-4">
                    <span class="flex h-3 w-3 relative">
                        <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-cyber opacity-75"></span>
                        <span class="relative inline-flex rounded-full h-3 w-3 bg-cyber"></span>
                    </span>
                    <span class="font-mono text-sm text-gray-400">Sistema en línea</span>
                </div>
            </header>

            <div class="flex-1 overflow-y-auto p-8">
                
                <!-- Tabla de Reservas -->
                <div class="glass p-8 rounded-xl border border-white/10 bg-gray-900">
                    <h3 class="text-2xl font-bold text-white mb-6 font-mono">>_ RESERVAS_RECIBIDAS</h3>
                    
                    <div class="overflow-x-auto">
                        <table class="w-full text-left text-sm whitespace-nowrap">
                            <thead class="text-xs uppercase bg-black/50 text-gray-400 font-mono border-b border-white/10">
                                <tr>
                                    <th class="p-4">Timestamp</th>
                                    <th class="p-4">Operador</th>
                                    <th class="p-4">Email</th>
                                    <th class="p-4">Fecha y Hora</th>
                                    <th class="p-4 text-cyber">Servicios</th>
                                </tr>
                            </thead>
                            <tbody 
                                id="tabla-reservas"
                                hx-trigger="load" 
                                hx-swap="innerHTML">
                                <tr>
                                    <td colspan="5" class="p-6 text-center text-cyber animate-pulse font-mono">
                                        Obteniendo datos cifrados desde el servidor...
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>

            </div>
        </main>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            fetch("../config.json") 
                .then(response => {
                    if (!response.ok) {
                        throw new Error(`No se pudo cargar config.json (Estado: ${response.status})`);
                    }
                    return response.json();
                })
                .then(config => {
                    const tbody = document.getElementById("tabla-reservas");
                    if (tbody) {
                        tbody.setAttribute("hx-get", config.apiUrl + "/admin/reservas");
                        htmx.process(tbody);
                    }
                })
                .catch(err => {
                    console.error("Error de conexión al nodo central:", err);
                    document.getElementById("tabla-reservas").innerHTML = 
                        `<tr><td colspan='5' class='p-6 text-center text-red-500 font-mono'>
                            [!] ERROR: ${err.message}. Asegúrate de que config.json existe en la raíz.
                        </td></tr>`;
                });
        });

        function verificarLogin() {
            const user = document.getElementById('adminUser').value;
            const pass = document.getElementById('adminPass').value;
            const btnText = document.getElementById('btnText');
            const errorMsg = document.getElementById('loginError');
            
            errorMsg.classList.add('hidden');
            btnText.innerText = "Verificando red...";

            setTimeout(() => {
                if (user === 'admin' && pass === 'byteknight') {
                    const loginScreen = document.getElementById('loginGateway');
                    const dashboard = document.getElementById('dashboardContent');

                    loginScreen.style.opacity = '0';
                    
                    setTimeout(() => {
                        loginScreen.classList.add('hidden');
                        dashboard.classList.remove('hidden');
                        
                        setTimeout(() => {
                            dashboard.style.opacity = '1';
                        }, 50);

                    }, 500); 
                    
                } else {
                    errorMsg.classList.remove('hidden');
                    btnText.innerText = "Desencriptar";
                    
                    const loginBox = document.querySelector('.max-w-sm');
                    loginBox.classList.add('translate-x-2');
                    setTimeout(() => loginBox.classList.remove('translate-x-2'), 100);
                }
            }, 1000);
        }

        function cerrarSesion() {
            window.location.reload();
        }

        document.getElementById('adminPass').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                verificarLogin();
            }
        });
    </script>
</body>
</html>
