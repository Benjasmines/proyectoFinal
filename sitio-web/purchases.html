<!DOCTYPE html>
<html lang="es" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reserva Confirmada | ByteKnight</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        cyber: '#dc2626', // Rojo ByteKnight
                        dark: '#030712'
                    }
                }
            }
        }
    </script>
</head>
<body class="min-h-screen bg-gray-950 text-gray-100 flex items-center justify-center p-4 font-sans bg-[url('data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMjAiIGhlaWdodD0iMjAiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+PGNpcmNsZSBjeD0iMSIgY3k9IjEiIHI9IjEiIGZpbGw9InJnYmEoMjU1LDI1NSwyNTUsMC4wNSkiLz48L3N2Zz4=')]">

    <!-- Tarjeta de Confirmación -->
    <div class="max-w-lg w-full border border-white/10 bg-gray-900/80 backdrop-blur-md rounded-xl p-8 sm:p-10 shadow-2xl text-center relative overflow-hidden">
        
        <!-- Línea decorativa superior -->
        <div class="absolute top-0 left-1/2 -translate-x-1/2 w-1/3 h-1 bg-cyber shadow-[0_0_20px_#dc2626]"></div>

        <!-- Icono de Éxito -->
        <div class="w-20 h-20 mx-auto bg-cyber/10 rounded-full flex items-center justify-center mb-6 border border-cyber/30">
            <svg class="w-10 h-10 text-cyber" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
            </svg>
        </div>

        <!-- Títulos -->
        <h1 class="text-3xl font-mono uppercase tracking-widest text-white mb-2">Reserva<br><span class="text-cyber">Confirmada</span></h1>
        
        <p class="text-gray-400 text-sm mb-8">
            Tu auditoría ha sido agendada con éxito. Hemos enviado un correo electrónico con los detalles y el enlace para nuestra reunión.
        </p>

        <!-- Recibo / ID de Operación -->
        <div class="bg-gray-950 border border-gray-800 rounded-lg p-4 mb-8 text-left font-mono text-sm">
            <div class="flex justify-between border-b border-gray-800 pb-2 mb-2">
                <span class="text-gray-500">ID de Operación:</span>
                <span class="text-cyber" id="orderId">Cargando...</span>
            </div>
            <div class="flex justify-between">
                <span class="text-gray-500">Estado de red:</span>
                <span class="text-green-500 flex items-center">
                    <span class="w-2 h-2 rounded-full bg-green-500 mr-2 animate-pulse"></span>
                    Seguro
                </span>
            </div>
        </div>

        <!-- Botón Volver (Shimmer) -->
        <a href="index.html" class="w-full group/button relative inline-flex items-center justify-center overflow-hidden rounded-md bg-cyber/20 backdrop-blur-lg px-6 py-4 text-sm font-mono uppercase tracking-widest font-bold text-white transition-all duration-300 ease-in-out hover:scale-[1.02] hover:shadow-xl hover:shadow-cyber/50 border border-white/10 hover:border-cyber/50">
            <span>Volver al Inicio</span>
            <div class="absolute inset-0 flex h-full w-full justify-center [transform:skew(-13deg)_translateX(-100%)] group-hover/button:duration-1000 group-hover/button:[transform:skew(-13deg)_translateX(100%)]">
                <div class="relative h-full w-12 bg-white/30"></div>
            </div>
        </a>
    </div>

    <!-- Script para generar un ID aleatorio -->
    <script>
        // Genera un código aleatorio estilo "BK-A8F9X2" para que parezca una operación de servidor real
        window.onload = function() {
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
            let id = 'BK-';
            for (let i = 0; i < 6; i++) {
                id += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            document.getElementById('orderId').innerText = id;
        }
    </script>
</body>
</html>
